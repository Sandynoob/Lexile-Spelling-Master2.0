<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lexile Master</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; }
    body {
      margin: 0; padding: 0;
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f8fafc; z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0; border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 全局防御脚本：防止系统注入插件崩溃 -->
  <script>
    (function() {
      // 如果系统 TTS 被损坏，我们预先给它一个空的 cancel 方法，防止抛出 Uncaught TypeError
      if (window.speechSynthesis && !window.speechSynthesis.cancel) {
        window.speechSynthesis.cancel = function() {};
      }
      // 捕获所有 Promise 错误
      window.onunhandledrejection = function(event) {
        if (event.reason && event.reason.message && event.reason.message.includes('cancel')) {
          event.preventDefault();
        }
      };
    })();
  </script>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #64748b; font-weight: bold;">Initializing Lexile Engine...</p>
  </div>

  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>

  <script>
    (function() {
      var check = setInterval(function() {
        var root = document.getElementById('root');
        if (root && root.hasChildNodes()) {
          var loader = document.getElementById('loading-screen');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function() { loader.style.display = 'none'; }, 500);
          }
          clearInterval(check);
        }
      }, 100);
      setTimeout(function() { clearInterval(check); }, 8000);
    })();
  </script>
</body>
</html>
